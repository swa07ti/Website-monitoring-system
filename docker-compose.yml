services:
  # 1. Python Monitoring Service
  monitor:
    build: ./backend
    container_name: python-monitor
    ports:
      - "8000:8000"
    restart: unless-stopped

  # 2. Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      # Mount our custom configuration file into the container
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    depends_on:
      - monitor # Wait for monitor to start first

  # 3. Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      # Mount the provisioning folder so Prometheus is added automatically
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    depends_on:
      - prometheus # Wait for prometheus to start first
